# Retries and run timeout for integration tests (TEST-01).
# Policy: minimal retries so flakiness remains visible; bounded time so hung tests fail fast.
# See .planning/phases/08-thorough-testing/08-RESEARCH.md and docs/testing.md.

[profile.default]
retries = { backoff = "fixed", count = 2 }
slow-timeout = { period = "60s", terminate-after = 3 }
