# Canonical allowlist for framework boundary enforcement.
# CI scripts must use this file as the single source of truth.
# See docs/framework-surface.md for the embedder-oriented description.

[neuroide-hub]
# neuroide-hub (apps/) may list only these workspace crates as path dependencies.
allowed = [
  "neurohid-types",
  "neurohid-core",
  "neurohid-storage",
  "neurohid-ipc",
]

[neuroide]
# neuroide GUI binary (apps/) may depend on these framework crates plus the hub.
allowed = ["neurohid-types", "neurohid-core", "neuroide-hub"]

[neurohid-service]
# neurohid-service headless daemon may depend on these framework crates.
allowed = [
  "neurohid-types",
  "neurohid-core",
  "neurohid-ipc",
  "neurohid-storage",
]
