name: Python Quality

on:
  pull_request:
    branches: [main]
    paths:
      - "python/**"
      - ".github/workflows/python-quality.yml"
  push:
    branches: [main]
    paths:
      - "python/**"
      - ".github/workflows/python-quality.yml"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - name: Install Python dependencies
        run: uv sync --directory python --extra dev
      - name: Ruff
        run: uv run --project python ruff check python/src python/tests
      - name: Black
        run: uv run --project python black --check python/src python/tests
      - name: MyPy
        run: uv run --project python mypy python/src
      - name: Pytest
        run: uv run --project python pytest python/tests -q
