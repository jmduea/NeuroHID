name: Python Quality

on:
  pull_request:
    branches: [main]
    paths:
      - "python/**"
      - ".github/workflows/python-quality.yml"
  push:
    branches: [main]
    paths:
      - "python/**"
      - ".github/workflows/python-quality.yml"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v4
      - name: Run canonical Python quality gates
        shell: pwsh
        run: ./.github/scripts/run-agent-ready-tasks.ps1 -SkipRust -WithPython
