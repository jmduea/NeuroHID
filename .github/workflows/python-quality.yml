name: Python Quality

on:
  pull_request:
    branches: [main]
    paths:
      - "python/**"
      - ".github/workflows/python-quality.yml"
  push:
    branches: [main]
    paths:
      - "python/**"
      - ".github/workflows/python-quality.yml"

env:
  PYTHON_COVERAGE_MIN: "48"

jobs:
  quality:
    runs-on: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v4
      - uses: Swatinem/rust-cache@v2
      - name: Run canonical Python quality gates
        shell: pwsh
        run: ./.github/scripts/run-agent-ready-tasks.ps1 -SkipRust -WithPython
      - name: Run Python coverage gate
        run: >
          uv run --project python pytest python/tests -q
          --cov=neurohid_ml --cov-branch --cov-report=term-missing --cov-report=xml
          --cov-fail-under=${{ env.PYTHON_COVERAGE_MIN }}
      - name: Upload Python coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-quality-coverage-xml
          path: python/coverage.xml
      - name: Upload Python coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: python/coverage.xml
          flags: python
          name: python-quality-coverage
          fail_ci_if_error: false
