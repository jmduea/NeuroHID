name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install LSL
        run: sudo apt-get update && sudo apt-get install -y liblsl-dev

      # Publish SDK first (no dependency on neurohid binary)
      - name: Publish neurohid-sdk
        run: cargo publish -p neurohid-sdk
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # Then publish the binary crate
      - name: Publish neurohid
        run: cargo publish -p neurohid
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
