name: Governance Integrity

on:
    pull_request:
        branches: [main]
        paths:
            - ".github/automation/policy-manifest.json"
            - ".github/workflows/**"
            - ".github/scripts/validate-policy-integrity.ps1"
            - ".github/scripts/test-validate-policy-integrity.ps1"
            - ".github/PULL_REQUEST_TEMPLATE.md"
            - "AGENTS.md"
            - "CONTRIBUTING.md"
            - "docs/development-guide.md"
            - "docs/automation/**"
            - "CHANGELOG.md"
    push:
        branches: [main]
        paths:
            - ".github/automation/policy-manifest.json"
            - ".github/workflows/**"
            - ".github/scripts/validate-policy-integrity.ps1"
            - ".github/scripts/test-validate-policy-integrity.ps1"
            - ".github/PULL_REQUEST_TEMPLATE.md"
            - "AGENTS.md"
            - "CONTRIBUTING.md"
            - "docs/development-guide.md"
            - "docs/automation/**"
            - "CHANGELOG.md"

jobs:
    policy-integrity:
        name: Governance Integrity
        runs-on: [self-hosted, linux, neurohid-ci]
        steps:
            - uses: actions/checkout@v4
            - name: Run policy validator fixture tests
              shell: pwsh
              run: ./.github/scripts/test-validate-policy-integrity.ps1
            - name: Validate policy manifest integrity
              shell: pwsh
              run: ./.github/scripts/validate-policy-integrity.ps1
