name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PYTHON_COVERAGE_MIN: "48"
  RUST_COVERAGE_MIN: "25"

jobs:
  determine-impact:
    name: Determine Impact
    runs-on: [self-hosted, linux, neurohid-ci]
    outputs:
      rust: ${{ steps.impact.outputs.rust }}
      python: ${{ steps.impact.outputs.python }}
      docs: ${{ steps.impact.outputs.docs }}
      protocol: ${{ steps.impact.outputs.protocol }}
      architecture: ${{ steps.impact.outputs.architecture }}
      unsafe: ${{ steps.impact.outputs.unsafe }}
      automation: ${{ steps.impact.outputs.automation }}
      required_checks: ${{ steps.impact.outputs.required_checks }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Classify change impact
        id: impact
        shell: pwsh
        run: ./.github/scripts/classify-impact.ps1 -OutputJsonPath .github/automation/impact-output.json
      - name: Upload impact artifact
        uses: actions/upload-artifact@v4
        with:
          name: impact-output
          path: .github/automation/impact-output.json

  focused-gates:
    name: Focused Gates
    runs-on: [self-hosted, linux, neurohid-ci]
    needs: determine-impact
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v4
      - uses: Swatinem/rust-cache@v2
      - name: Run canonical focused gates
        shell: pwsh
        run: |
          $args = @('-File', './.github/scripts/run-agent-ready-tasks.ps1', '-RustScope', 'focused')
          if ('${{ needs.determine-impact.outputs.python }}' -eq 'true') { $args += '-WithPython' }
          if ('${{ needs.determine-impact.outputs.docs }}' -eq 'true') { $args += '-WithDocs' }
          if ('${{ needs.determine-impact.outputs.protocol }}' -eq 'true') { $args += '-WithProtocol' }
          if ('${{ needs.determine-impact.outputs.unsafe }}' -eq 'true') { $args += '-WithUnsafe' }
          & pwsh @args

  test:
    name: Test
    needs: determine-impact
    if: needs.determine-impact.outputs.rust == 'true' || github.event_name == 'push'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runner_os: Linux
            runner: [self-hosted, linux, neurohid-ci]
          - platform: windows
            runner_os: Windows
            runner: [self-hosted, windows, neurohid-ci]
    steps:
      - uses: actions/checkout@v4
      - name: Prefer Git Bash (Windows)
        if: matrix.runner_os == 'Windows'
        shell: pwsh
        run: |
          'C:\Program Files\Git\usr\bin' | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          'C:\Program Files\Git\bin' | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install LSL (Linux)
        if: matrix.runner_os == 'Linux'
        run: |
          if dpkg-query -W -f='${Status}' liblsl-dev 2>/dev/null | grep -q 'install ok installed'; then
            echo "liblsl-dev already installed; skipping install."
            exit 0
          fi

          if command -v apt-get >/dev/null 2>&1; then
            if [ "$(id -u)" -eq 0 ]; then
              apt-get update && apt-get install -y liblsl-dev
            elif command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
              sudo -n apt-get update && sudo -n apt-get install -y liblsl-dev
            else
              echo "Skipping liblsl-dev install: non-interactive sudo is unavailable on this runner."
            fi
          fi
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo test --workspace

  test-macos:
    name: Test (macOS)
    needs: determine-impact
    if: (needs.determine-impact.outputs.rust == 'true' || github.event_name == 'push') && vars.ENABLE_MACOS == 'true'
    runs-on: [self-hosted, macos, neurohid-ci]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo test --workspace

  clippy:
    name: Clippy
    needs: determine-impact
    if: needs.determine-impact.outputs.rust == 'true' || github.event_name == 'push'
    runs-on: [self-hosted, linux, neurohid-ci]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install LSL
        run: |
          if dpkg-query -W -f='${Status}' liblsl-dev 2>/dev/null | grep -q 'install ok installed'; then
            echo "liblsl-dev already installed; skipping install."
            exit 0
          fi

          if command -v apt-get >/dev/null 2>&1; then
            if [ "$(id -u)" -eq 0 ]; then
              apt-get update && apt-get install -y liblsl-dev
            elif command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
              sudo -n apt-get update && sudo -n apt-get install -y liblsl-dev
            else
              echo "Skipping liblsl-dev install: non-interactive sudo is unavailable on this runner."
            fi
          fi
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings -W clippy::undocumented_unsafe_blocks -W clippy::missing_safety_doc

  fmt:
    name: Format
    needs: determine-impact
    if: needs.determine-impact.outputs.rust == 'true' || github.event_name == 'push'
    runs-on: [self-hosted, linux, neurohid-ci]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format check
        run: cargo fmt --check

  docs:
    name: Documentation
    needs: determine-impact
    if: needs.determine-impact.outputs.rust == 'true' || github.event_name == 'push'
    runs-on: [self-hosted, linux, neurohid-ci]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install LSL
        run: |
          if dpkg-query -W -f='${Status}' liblsl-dev 2>/dev/null | grep -q 'install ok installed'; then
            echo "liblsl-dev already installed; skipping install."
            exit 0
          fi

          if command -v apt-get >/dev/null 2>&1; then
            if [ "$(id -u)" -eq 0 ]; then
              apt-get update && apt-get install -y liblsl-dev
            elif command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
              sudo -n apt-get update && sudo -n apt-get install -y liblsl-dev
            else
              echo "Skipping liblsl-dev install: non-interactive sudo is unavailable on this runner."
            fi
          fi
      - name: Build docs
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  python-tests:
    name: Python Tests
    needs: determine-impact
    if: needs.determine-impact.outputs.python == 'true' || github.event_name == 'push'
    runs-on: [self-hosted, linux, neurohid-ci]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - name: Install Python dependencies
        run: uv sync --directory python --extra dev
      - name: Run Python tests with coverage gate
        run: >
          uv run --project python pytest python/tests -q
          --cov=neurohid_ml --cov-branch --cov-report=term-missing --cov-report=xml
          --cov-fail-under=${{ env.PYTHON_COVERAGE_MIN }}
      - name: Upload Python coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-xml
          path: python/coverage.xml
      - name: Upload Python coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: python/coverage.xml
          flags: python
          name: python-coverage
          fail_ci_if_error: false

  rust-coverage:
    name: Rust Coverage
    needs: determine-impact
    if: needs.determine-impact.outputs.rust == 'true' || github.event_name == 'push'
    runs-on: [self-hosted, linux, neurohid-ci]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install LSL
        run: |
          if dpkg-query -W -f='${Status}' liblsl-dev 2>/dev/null | grep -q 'install ok installed'; then
            echo "liblsl-dev already installed; skipping install."
            exit 0
          fi

          if command -v apt-get >/dev/null 2>&1; then
            if [ "$(id -u)" -eq 0 ]; then
              apt-get update && apt-get install -y liblsl-dev
            elif command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
              sudo -n apt-get update && sudo -n apt-get install -y liblsl-dev
            else
              echo "Skipping liblsl-dev install: non-interactive sudo is unavailable on this runner."
            fi
          fi
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run Rust coverage gate
        run: >
          mkdir -p target/llvm-cov &&
          cargo llvm-cov --workspace
          --lcov --output-path target/llvm-cov/lcov.info
      - name: Enforce Rust coverage threshold
        run: |
          read -r covered total percent <<EOF
          $(awk -F'[:,]' '
            /^DA:/ {
              total += 1;
              if (($3 + 0) > 0) {
                covered += 1;
              }
            }
            END {
              if (total == 0) {
                printf "0 0 0.00\n";
              } else {
                printf "%d %d %.2f\n", covered, total, (covered / total) * 100;
              }
            }
          ' target/llvm-cov/lcov.info)
          EOF

          echo "Rust line coverage: ${percent}% (${covered}/${total})"
          echo "Rust coverage minimum: ${RUST_COVERAGE_MIN}%"

          if awk -v percent="$percent" -v min="$RUST_COVERAGE_MIN" 'BEGIN { exit !(percent + 0 >= min + 0) }'; then
            echo "Rust coverage gate passed."
          else
            echo "Rust coverage gate failed: ${percent}% < ${RUST_COVERAGE_MIN}%"
            exit 1
          fi
      - name: Upload Rust coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage-lcov
          path: target/llvm-cov/lcov.info
      - name: Upload Rust coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: target/llvm-cov/lcov.info
          flags: rust
          name: rust-coverage
          fail_ci_if_error: false

  unsafe-compliance:
    name: Unsafe Compliance
    needs: determine-impact
    if: needs.determine-impact.outputs.unsafe == 'true'
    runs-on: [self-hosted, linux, neurohid-ci]
    steps:
      - uses: actions/checkout@v4
      - name: Validate unsafe compliance
        shell: pwsh
        run: ./.github/scripts/check-unsafe-compliance.ps1

  protocol-contracts:
    name: Protocol Contracts
    needs: determine-impact
    if: needs.determine-impact.outputs.protocol == 'true'
    runs-on: [self-hosted, linux, neurohid-ci]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify protocol contracts
        shell: pwsh
        run: ./.github/scripts/verify-protocol-contracts.ps1
