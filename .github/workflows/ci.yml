name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PYTHON_COVERAGE_MIN: "50"
  RUST_COVERAGE_MIN: "35"

jobs:
  determine-impact:
    name: Determine Impact
    runs-on: [ubuntu-latest]
    outputs:
      rust: ${{ steps.impact.outputs.rust }}
      python: ${{ steps.impact.outputs.python }}
      docs: ${{ steps.impact.outputs.docs }}
      protocol: ${{ steps.impact.outputs.protocol }}
      architecture: ${{ steps.impact.outputs.architecture }}
      unsafe: ${{ steps.impact.outputs.unsafe }}
      automation: ${{ steps.impact.outputs.automation }}
      required_checks: ${{ steps.impact.outputs.required_checks }}
    steps:
      - uses: actions/checkout@v4
      - name: Classify change impact
        id: impact
        shell: pwsh
        run: ./.github/scripts/classify-impact.ps1 -OutputJsonPath .github/automation/impact-output.json
      - name: Upload impact artifact
        uses: actions/upload-artifact@v4
        with:
          name: impact-output
          path: .github/automation/impact-output.json

  focused-gates:
    name: Focused Gates
    runs-on: [self-hosted, linux, neurohid-ci]
    needs: determine-impact
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v4
      - uses: Swatinem/rust-cache@v2
      - name: Run canonical focused gates
        shell: pwsh
        run: |
          $args = @('-File', './.github/scripts/run-agent-ready-tasks.ps1', '-RustScope', 'focused')
          if ('${{ needs.determine-impact.outputs.python }}' -eq 'true') { $args += '-WithPython' }
          if ('${{ needs.determine-impact.outputs.docs }}' -eq 'true') { $args += '-WithDocs' }
          if ('${{ needs.determine-impact.outputs.protocol }}' -eq 'true') { $args += '-WithProtocol' }
          if ('${{ needs.determine-impact.outputs.unsafe }}' -eq 'true') { $args += '-WithUnsafe' }
          & pwsh @args

  test:
    name: Test
    needs: determine-impact
    if: needs.determine-impact.outputs.rust == 'true' || github.event_name == 'push'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runner_os: Linux
            runner: [self-hosted, linux, neurohid-ci]
          - platform: linux
            runner_os: Linux
            runner: ubuntu-22.04
          - platform: windows
            runner_os: Windows
            runner: [self-hosted, windows, neurohid-ci]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9
      - name: Install LSL (Linux)
        if: matrix.runner_os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y liblsl-dev
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo nextest run --workspace
      - name: Extension outlet e2e
        run: cargo nextest run -p neurohid-core --test extension_outlet_e2e
      - name: Pipeline integration
        run: cargo nextest run -p neurohid-core --test pipeline_integration

  test-macos:
    name: Test (macOS)
    needs: determine-impact
    if: (needs.determine-impact.outputs.rust == 'true' || github.event_name == 'push') && vars.ENABLE_MACOS != 'false'
    runs-on: [self-hosted, macos, neurohid-ci]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo nextest run --workspace
      - name: Extension outlet e2e
        run: cargo nextest run -p neurohid-core --test extension_outlet_e2e
      - name: Pipeline integration
        run: cargo nextest run -p neurohid-core --test pipeline_integration

  clippy:
    name: Clippy
    needs: determine-impact
    if: needs.determine-impact.outputs.rust == 'true' || github.event_name == 'push'
    runs-on: [self-hosted, linux, neurohid-ci]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install LSL
        run: sudo apt-get update && sudo apt-get install -y liblsl-dev
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings -W clippy::undocumented_unsafe_blocks -W clippy::missing_safety_doc

  fmt:
    name: Format
    needs: determine-impact
    if: needs.determine-impact.outputs.rust == 'true' || github.event_name == 'push'
    runs-on: [self-hosted, linux, neurohid-ci]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format check
        run: cargo fmt --check

  framework-boundary:
    name: Framework Boundary
    needs: determine-impact
    if: needs.determine-impact.outputs.rust == 'true' || needs.determine-impact.outputs.automation == 'true' || github.event_name == 'push'
    runs-on: [self-hosted, linux, neurohid-ci]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check framework boundary
        shell: pwsh
        run: ./.github/scripts/check-framework-boundary.ps1

  docs:
    name: Documentation
    needs: determine-impact
    if: needs.determine-impact.outputs.rust == 'true' || github.event_name == 'push'
    runs-on: [self-hosted, linux, neurohid-ci]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install LSL
        run: sudo apt-get update && sudo apt-get install -y liblsl-dev
      - name: Build docs
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  python-tests:
    name: Python Tests
    needs: determine-impact
    if: needs.determine-impact.outputs.python == 'true' || github.event_name == 'push'
    runs-on: [self-hosted, linux, neurohid-ci]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v4
      - uses: Swatinem/rust-cache@v2
      - name: Install Python dependencies (builds Rust extension via maturin)
        run: uv sync --directory python --extra dev
      - name: Run Python tests with coverage gate
        run: >
          uv run --project python pytest python/tests -q
          --cov=neurohid_ml --cov-branch --cov-report=term-missing --cov-report=xml
          --cov-fail-under=${{ env.PYTHON_COVERAGE_MIN }}
      - name: Upload Python coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-xml
          path: python/coverage.xml
      - name: Upload Python coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: python/coverage.xml
          flags: python
          name: python-coverage
          fail_ci_if_error: false

  e2e-service-client:
    name: E2E Service + Python Client
    needs: determine-impact
    if: needs.determine-impact.outputs.rust == 'true' || needs.determine-impact.outputs.python == 'true' || github.event_name == 'push'
    runs-on: [self-hosted, linux, neurohid-ci]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v4
      - uses: Swatinem/rust-cache@v2
      - name: Install LSL (Linux)
        run: sudo apt-get update && sudo apt-get install -y liblsl-dev
      - name: Build neurohid-service
        run: cargo build -p neurohid-service
      - name: Install Python dependencies
        run: uv sync --directory python --extra dev
      - name: Run E2E test (service + Python client)
        run: uv run --project python pytest python/tests/test_e2e_service_client.py -v

  ipc-compat-matrix:
    name: IPC Compat Matrix
    needs: determine-impact
    if: needs.determine-impact.outputs.protocol == 'true' || github.event_name == 'push'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            transport: tcp_loopback
            runner: [self-hosted, linux, neurohid-ci]
          - platform: linux
            transport: local_socket
            runner: [self-hosted, linux, neurohid-ci]
          - platform: windows
            transport: tcp_loopback
            runner: [self-hosted, windows, neurohid-ci]
          - platform: windows
            transport: local_socket
            runner: [self-hosted, windows, neurohid-ci]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v4
      - uses: Swatinem/rust-cache@v2
      - name: Install Python dependencies (builds Rust extension via maturin)
        run: uv sync --directory python --extra dev
      - name: Rust transport smoke (tcp_loopback)
        if: matrix.transport == 'tcp_loopback'
        run: cargo test -p neurohid-ipc explicit_tcp_transport_roundtrips_messages -- --nocapture
      - name: Rust transport smoke (local_socket)
        if: matrix.transport == 'local_socket'
        run: cargo test -p neurohid-ipc explicit_local_socket_transport_roundtrips_messages -- --nocapture
      - name: Unified service multiplexing smoke
        run: cargo test -p neurohid-service runtime_events_subscription_does_not_block_control_rpc -- --nocapture
      - name: Python IPC surface smoke
        run: >
          uv run --project python python -m unittest
          python/tests/test_control_client.py
          python/tests/test_bridge.py

  rust-coverage:
    name: Rust Coverage
    needs: determine-impact
    if: needs.determine-impact.outputs.rust == 'true' || github.event_name == 'push'
    runs-on: [self-hosted, linux, neurohid-ci]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install LSL
        run: sudo apt-get update && sudo apt-get install -y liblsl-dev
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run Rust coverage gate
        run: >
          cargo llvm-cov --workspace
          --lcov --output-path target/llvm-cov/lcov.info
          --fail-under-lines ${{ env.RUST_COVERAGE_MIN }}
      - name: Upload Rust coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage-lcov
          path: target/llvm-cov/lcov.info
      - name: Upload Rust coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: target/llvm-cov/lcov.info
          flags: rust
          name: rust-coverage
          fail_ci_if_error: false

  unsafe-compliance:
    name: Unsafe Compliance
    needs: determine-impact
    runs-on: [self-hosted, linux, neurohid-ci]
    steps:
      - uses: actions/checkout@v4
      - name: Validate unsafe compliance
        shell: pwsh
        run: ./.github/scripts/check-unsafe-compliance.ps1

  protocol-contracts:
    name: Protocol Contracts
    needs: determine-impact
    if: needs.determine-impact.outputs.protocol == 'true'
    runs-on: [self-hosted, linux, neurohid-ci]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify protocol contracts
        shell: pwsh
        run: ./.github/scripts/verify-protocol-contracts.ps1
