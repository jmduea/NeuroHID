name: Docs Freshness

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "crates/**"
      - "python/**"
      - "README.md"
      - "CHANGELOG.md"
      - ".github/workflows/docs-freshness.yml"

jobs:
  docs-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Classify impact
        shell: pwsh
        run: ./.github/scripts/classify-impact.ps1 -OutputJsonPath .github/automation/impact-output.json
      - name: Validate docs freshness policy
        shell: pwsh
        run: ./.github/scripts/check-docs-freshness.ps1
      - name: Upload docs freshness impact artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-freshness-impact
          path: .github/automation/impact-output.json
