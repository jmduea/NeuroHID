name: Branch Policy

on:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-only-main:
    name: Enforce PR-only main updates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate main update came from PR
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./.github/scripts/enforce-pr-only-main.ps1